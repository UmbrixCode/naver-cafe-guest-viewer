<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, "Malgun Gothic", sans-serif;
      font-size: 13px;
      color: #333;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 15px;
      color: #03c75a;
    }
    .input-group {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    input[type="text"] {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
    }
    button {
      padding: 8px 14px;
      background: #03c75a;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    button:hover { background: #02b050; }
    button:disabled { background: #ccc; cursor: default; }
    #status {
      margin-top: 8px;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.6;
      display: none;
    }
    #status.show { display: block; }
    .info-label { color: #888; }
    .error { color: #e74c3c; }
    .success { color: #03c75a; }
    .btn-group {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .btn-search {
      background: #4285f4;
      flex: 1;
    }
    .btn-search:hover { background: #3275e4; }
    .btn-direct {
      background: #666;
      flex: 1;
    }
    .btn-direct:hover { background: #555; }
  </style>
</head>
<body>
  <h3>네이버 카페 검색 경유 뷰어</h3>
  <div class="input-group">
    <input type="text" id="urlInput" placeholder="카페 글 URL 입력 또는 현재 탭 자동 감지">
    <button id="btnProcess">조회</button>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
