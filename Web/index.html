<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>네이버 카페 검색 경유 뷰어</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2303c75a'/><text x='16' y='23' text-anchor='middle' font-size='20' font-weight='bold' fill='white' font-family='Arial'>C</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1><a href="https://cafe.naver.com" target="_blank" rel="noopener">네이버 카페</a> 검색 경유 뷰어</h1>
    <p class="subtitle">비가입 카페 글을 검색 경유로 조회합니다</p>

    <div class="card">
      <label for="urlInput">카페 글 URL</label>
      <textarea id="urlInput" placeholder="네이버 카페 글 URL을 붙여넣으세요&#10;예: https://cafe.naver.com/카페명/글번호"></textarea>
      <button class="btn-process" id="btnProcess">조회</button>
      <p class="paste-hint">네이버 앱에서 공유 → 링크 복사 후 붙여넣기</p>
    </div>

    <div id="result"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
